# ============================================================
# LightGBM tuning config — agriBORA Phase 5a
# Features: v3 (14 features, no KAMIS)
# Baseline: local=2.42, private LB=+0.435
# ============================================================

experiment_id: "E03a_lgbm_tuned_v3"

model: "lightgbm"
feature_version: "v3"
train_path: "outputs/features/v3/train_fe.parquet"

target_col: "WholeSale"
time_col: "Year_Week"
n_folds: 5
seed: 42

feature_cols:
  - lag1_price
  - lag2_price
  - rolling_4w_mean
  - deviation_from_rolling_mean
  - rolling_4w_max
  - price_momentum
  - week_of_year
  - weeks_in_lean_season
  - is_short_harvest_window
  - weeks_to_long_harvest
  - nairobi_lag1
  - ug_lag1
  - national_mean_lag1
  - nairobi_ug_spread
  - County

categorical_cols:
  - County

optuna:
  n_trials: 100
  timeout: 3600        # stop at first: 100 trials OR 1 hour

search_space:
  objective:          ["regression_l1", "regression"]   # MAE vs MSE
  learning_rate:      [0.01, 0.1]
  num_leaves:         [7, 31]
  min_child_samples:  [3, 30]
  feature_fraction:   [0.5, 1.0]
  bagging_fraction:   [0.5, 1.0]
  reg_alpha:          [1.0e-8, 10.0]
  reg_lambda:         [1.0e-8, 10.0]
